version: "3.9"

services:

  # ============================================================
  # LittleHorse Server (gRPC on 2023, dashboard on 8080)
  # ============================================================
  lh-server:
    image: ghcr.io/littlehorse-enterprises/littlehorse/lh-standalone:1.0.1
    container_name: lh-server
    network_mode: host
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/liveness"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  # ============================================================
  # Logs API - :7001
  # ============================================================
  logs-api:
    build:
      context: .
      dockerfile: logs-api/Dockerfile
    container_name: logs-api
    network_mode: host
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7001/logs?limit=1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ============================================================
  # Core Banking Service - :7002
  # ============================================================
  core-banking-service:
    build:
      context: .
      dockerfile: core-banking-service/Dockerfile
    container_name: core-banking-service
    network_mode: host
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7002/accounts/count"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ============================================================
  # Admin UI - :7003
  # ============================================================
  admin-ui:
    build:
      context: .
      dockerfile: admin-ui/Dockerfile
    container_name: admin-ui
    network_mode: host
    environment:
      - LOGS_API_URL=http://localhost:7001
      - CORE_BANKING_URL=http://localhost:7002
      - LHW_SERVER_HOST=localhost
      - LHW_SERVER_PORT=2023
      - LH_SERVER_HOST=localhost
      - LH_SERVER_PORT=2023
      - CASE_MANAGEMENT_URL=http://localhost:7007
    depends_on:
      lh-server:
        condition: service_healthy
      logs-api:
        condition: service_healthy
      core-banking-service:
        condition: service_healthy

  # ============================================================
  # Fraud Detection Engine - :7004
  # ============================================================
  fraud-detection-engine:
    build:
      context: .
      dockerfile: fraud-detection-engine/Dockerfile
    container_name: fraud-detection-engine
    network_mode: host
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--post-data={}", "http://localhost:7004/detect"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ============================================================
  # Verification Service - :7005
  # ============================================================
  verification-service:
    build:
      context: .
      dockerfile: verification-service/Dockerfile
    container_name: verification-service
    network_mode: host
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7005/health"]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      - CORE_BANKING_URL=http://localhost:7002
    depends_on:
      core-banking-service:
        condition: service_healthy

  # ============================================================
  # Data Generation Service - :7006
  # Generates live events and triggers LH fraud workflows
  # ============================================================
  data-generation-service:
    build:
      context: .
      dockerfile: data-generation-service/Dockerfile
    container_name: data-generation-service
    network_mode: host
    environment:
      - LOGS_API_URL=http://localhost:7001
      - LHW_SERVER_HOST=localhost
      - LHW_SERVER_PORT=2023
      - LH_SERVER_HOST=localhost
      - LH_SERVER_PORT=2023
      - LH_ENABLED=true
    depends_on:
      lh-server:
        condition: service_healthy
      logs-api:
        condition: service_healthy

  # ============================================================
  # Workflows (LH Task Workers + WfSpec Registration)
  # This is the orchestration brain - registers all WfSpecs and
  # runs 9 LHTaskWorkers to execute tasks when LH schedules them.
  # ============================================================
  workflows:
    build:
      context: .
      dockerfile: workflows/Dockerfile
    container_name: workflows
    network_mode: host
    environment:
      - LHW_SERVER_HOST=localhost
      - LHW_SERVER_PORT=2023
      - LH_SERVER_HOST=localhost
      - LH_SERVER_PORT=2023
      - CORE_BANKING_URL=http://localhost:7002
      - FRAUD_ENGINE_URL=http://localhost:7004
      - VERIFICATION_URL=http://localhost:7005
      - LOGS_API_URL=http://localhost:7001
      - CASE_MANAGEMENT_URL=http://localhost:7007
    depends_on:
      lh-server:
        condition: service_healthy
      logs-api:
        condition: service_healthy
      core-banking-service:
        condition: service_healthy
      fraud-detection-engine:
        condition: service_healthy
      verification-service:
        condition: service_healthy
      case-management-service:
        condition: service_healthy

  # ============================================================
  # Case Management Service - :7007 [NEW]
  # ============================================================
  case-management-service:
    build:
      context: .
      dockerfile: case-management-service/Dockerfile
    container_name: case-management-service
    network_mode: host
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7007/api/cases"]
      interval: 5s
      timeout: 5s
      retries: 10
